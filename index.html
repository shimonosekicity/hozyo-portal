<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>下関市 補助金ポータル</title>
  <style>
    :root {
      --navy: #003366;
      --navy-dark: #002244;
      --navy-light: #004488;
      --white: #ffffff;
      --gray-light: #f0f4f8;
      --gray-border: #ccd6e0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: var(--gray-light);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--navy);
      color: var(--white);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    header .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--white);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    header .logo-mark span {
      font-size: 18px;
      font-weight: 900;
      color: var(--navy);
      line-height: 1;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.3;
    }

    header h1 small {
      display: block;
      font-size: 0.7rem;
      font-weight: 400;
      opacity: 0.85;
      letter-spacing: 0.08em;
    }

    /* トップ画面 */
    #top-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .top-lead {
      text-align: center;
      margin-bottom: 40px;
    }

    .top-lead h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .top-lead p {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.7;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      max-width: 640px;
    }

    .portal-btn {
      background: var(--white);
      border: 2px solid var(--navy);
      border-radius: 12px;
      padding: 28px 16px;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s, color 0.2s, transform 0.15s, box-shadow 0.2s;
      text-decoration: none;
      color: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0, 51, 102, 0.08);
    }

    .portal-btn:hover,
    .portal-btn:focus {
      background: var(--navy);
      color: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0, 51, 102, 0.25);
      outline: none;
    }

    .portal-btn .btn-icon {
      font-size: 2.4rem;
      line-height: 1;
    }

    .portal-btn .btn-label {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      line-height: 1.4;
    }

    .portal-btn .btn-desc {
      font-size: 0.75rem;
      opacity: 0.7;
      line-height: 1.5;
    }

    /* iframe 画面 */
    #iframe-screen {
      display: none;
      flex-direction: column;
      flex: 1;
    }

    #iframe-screen.active {
      display: flex;
    }

    .iframe-toolbar {
      background: var(--navy-dark);
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      flex-shrink: 0;
    }

    .back-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: var(--white);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
      font-family: inherit;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .iframe-title {
      font-size: 0.95rem;
      font-weight: 600;
      flex: 1;
    }

    #main-iframe {
      flex: 1;
      border: none;
      width: 100%;
      display: block;
    }

    footer {
      background: var(--navy-dark);
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      font-size: 0.72rem;
      padding: 12px 16px;
      letter-spacing: 0.05em;
    }

    /* レスポンシブ */
    @media (max-width: 480px) {
      header h1 {
        font-size: 0.95rem;
      }

      .top-lead h2 {
        font-size: 1.15rem;
      }

      .button-grid {
        grid-template-columns: 1fr;
        max-width: 320px;
      }

      .portal-btn {
        padding: 22px 16px;
        flex-direction: row;
        text-align: left;
        gap: 16px;
      }

      .portal-btn .btn-icon {
        font-size: 2rem;
        flex-shrink: 0;
      }

      .portal-btn .btn-label {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-mark"><span>下</span></div>
    <h1>
      下関市 補助金ポータル
      <small>Shimonoseki City Subsidy Portal</small>
    </h1>
  </header>

  <!-- トップ画面 -->
  <div id="top-screen">
    <div class="top-lead">
      <h2>ご利用になるサービスを<br>お選びください</h2>
      <p>補助金・助成金の情報確認や<br>要件診断シミュレーションができます</p>
    </div>

    <div class="button-grid">
      <button class="portal-btn" onclick="openIframe('list')" aria-label="補助金一覧を開く">
        <span class="btn-icon">📋</span>
        <span>
          <span class="btn-label">補助金一覧</span>
          <span class="btn-desc" style="display:block;">利用できる補助金を<br>一覧で確認</span>
        </span>
      </button>

      <button class="portal-btn" onclick="openIframe('sim')" aria-label="診断シミュレーションを開く">
        <span class="btn-icon">🔍</span>
        <span>
          <span class="btn-label">診断シミュレーション</span>
          <span class="btn-desc" style="display:block;">要件を入力して<br>対象補助金を診断</span>
        </span>
      </button>
    </div>
  </div>

  <!-- iframe 画面 -->
  <div id="iframe-screen">
    <div class="iframe-toolbar">
      <button class="back-btn" onclick="goBack()">
        ← 戻る
      </button>
      <span class="iframe-title" id="iframe-title"></span>
    </div>
    <iframe id="main-iframe" src="" title="コンテンツ表示エリア"></iframe>
  </div>

  <footer>
    &copy; 下関市　This portal is provided for informational purposes.
  </footer>

  <script>
    const pages = {
      list: {
        url: 'https://shimonosekicity.github.io/v2-/',
        title: '補助金一覧'
      },
      sim: {
        url: 'https://shimonosekicity.github.io/hozyo-navigetor/',
        title: '診断シミュレーション'
      }
    };

    function openIframe(key) {
      const page = pages[key];
      document.getElementById('top-screen').style.display = 'none';
      const iframeScreen = document.getElementById('iframe-screen');
      iframeScreen.classList.add('active');
      document.getElementById('iframe-title').textContent = page.title;
      document.getElementById('main-iframe').src = page.url;
    }

    function goBack() {
      document.getElementById('iframe-screen').classList.remove('active');
      document.getElementById('top-screen').style.display = 'flex';
      document.getElementById('main-iframe').src = '';
    }
  </script>

</body>
</html>
